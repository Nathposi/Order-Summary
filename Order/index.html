<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Summary</title>
    <link href="index.css" rel="stylesheet" />
  </head>
  <body>
    <div class="whole">
      <!--Whole tag-->
      <div class="image">
        <!--Image tag-->
        <img src="../images/illustration-hero.svg" alt="enjoy music" />
      </div>
      <!--image end tag-->

      <div class="about">
        <h1>Order Summary</h1>
        <p>
          You can now listen to millions of songs, audiobooks, and podcasts on
          any device anywhere you like!
        </p>
      </div>

      <div class="plan">
        <div class="img">
          <img src="../images/icon-music.svg" alt="Music" />
        </div>
        <div class="cash">
          <!-- <span class="bold">Annual Plan</span> -->
          <select class="options">
            <option value="Annual Plan">Annual Plan</option>
            <option value="Quaterly Plan">Quaterly Plan</option>
            <option value="Monthly Plan">Monthly Plan</option>
            <option value="Weekly Plan">Weekly Plan</option>
          </select>
          <span class="light">$59.99/year</span>
        </div>
      </div>
      <!--Plan-->

      <div class="pay">
        <!--pay tag-->
        <div class="pay yes">
          <a href="../Payment/index.html"> Proceed to Payment</a>
        </div>
        <div class="pay no">
          <a href="">Cancel Order</a>
        </div>
      </div>
      <!--Pay end tag-->
    </div>
    <!--Whole end  tag-->
    <script src="hi.js"></script>
  </body>
</html>
