<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Page</title>
    <link href="Payment.css" rel="stylesheet" />
  </head>
  <body>
    <div class="entire">
      <!--entire div-->
      <a href="../index.html">Link to Previous Page</a>

      <div class="h1">
        <!--h1 div-->
        <h1>My Store</h1>
      </div>
      <!--h1 div ending-->

      <div class="Order">
        <!--p div-->
        <p class="Plan"></p>
        <p class="Price"></p>
      </div>
      <!--p div ending-->

      <div class="how">
        <!--p div-->
        <p>How Would You Like To Pay ?</p>
      </div>
      <!--p div ending-->

      <div class="choose">
        <!--choose div-->
        <form>
          <label class="radio">
            <input type="radio" name="Pay option" value="Card" />
            Card
          </label>

          <label class="radio">
            <input type="radio" name="Pay option" value="Transfer" />
            Transfer
          </label>

          <input type="submit" value="Next" class="submit" />
        </form>
      </div>
      <!--choose div ending-->
      <div class="foot">
        <footer>Payment done by xxxx</footer>
      </div>
    </div>
    <!--entire div ending-->
    <script src="Payment.js"></script>
  </body>
</html>
